name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cx_support
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cx_support"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/cx_support
      REDIS_URL: redis://localhost:6381
      JWT_SECRET: ci-test-secret
      WIDGET_API_KEY: ci-widget-key
      OPENAI_API_KEY: sk-test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @cx/shared --filter @cx/db --filter @cx/ai build

      - name: Run migrations
        run: psql "$DATABASE_URL" -f packages/db/drizzle/0000_init.sql

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API
        run: pnpm --filter @cx/api build

      - name: Build widget
        run: pnpm widget:build

      - name: Build web
        run: pnpm --filter @cx/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_WIDGET_API_KEY: ci-widget-key
